<!--
  ============================================================================
  Pages/Instructor-Attendance.html  —  C.E.S.T.I.S Class Attendance (Instructor) UI fragment
  ----------------------------------------------------------------------------
  Fetched by index.html and injected into the mount slot
  (<div class="cestis-mount" data-feature="i-attendance" data-prefix="instructor">).
  Rendered on mount by: cestisInitIAttendance() (in index.html).
  All JS and CSS remain in index.html. Injected via innerHTML — <script> won't run.
  ============================================================================

    <div id="iAttendanceQuarterBar"></div>
    <div class="attendance-summary" id="iAttendanceSummary"></div>
    <div style="display:flex;gap:12px;margin-bottom:20px;align-items:center;">
      <label style="font-size:13px;font-weight:600;">Date:</label>
      <input type="date" class="form-control" style="width:180px;" id="iAttendanceDate">
      <button class="btn btn-primary" onclick="saveInstructorAttendance()">Save Attendance</button>
    </div>
    <div class="card"><div class="card-header"><h3>Class Attendance <span id="iAttCourseLabel"></span></h3><span style="font-size:13px;color:var(--text-muted);" id="iAttCount"></span></div>
      <div class="table-wrapper"><table class="attendance-table"><thead><tr><th>Student</th><th>ID</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th></tr></thead><tbody id="iAttendanceTableBody"></tbody></table></div>
    </div>
    <div class="card"><div class="card-header"><h3>Attendance Overview</h3></div>
      <div class="bar-chart" id="iWeeklyAttChart"></div>
    </div>
