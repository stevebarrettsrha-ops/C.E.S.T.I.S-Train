<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qual Plan / Curriculum — C.E.S.T.I.S</title>
<style>
  :root {
    --bg-primary: #0c1117;
    --bg-secondary: #141b24;
    --bg-card: #1a2332;
    --bg-card-hover: #1f2b3d;
    --bg-input: #0f1820;
    --accent: #f0a500;
    --accent-dim: rgba(240,165,0,0.15);
    --green: #2ecc71;
    --green-dim: rgba(46,204,113,0.15);
    --blue: #3498db;
    --red: #e74c3c;
    --text-primary: #e8edf3;
    --text-secondary: #8899aa;
    --text-muted: #556677;
    --border: rgba(255,255,255,0.06);
    --border-light: rgba(255,255,255,0.1);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    padding: 20px;
    -webkit-font-smoothing: antialiased;
  }
  .qp-header { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:12px; margin-bottom:18px; }
  .qp-header h1 { font-size:22px; font-weight:700; }
  .qp-header p { font-size:13px; color:var(--text-muted); margin-top:4px; }
  .qp-controls { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:18px; }
  .qp-input, .qp-select {
    background: var(--bg-input);
    border: 1px solid var(--border-light);
    color: var(--text-primary);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font-size: 13px;
    outline: none;
  }
  .qp-input { min-width: 240px; }
  .qp-input:focus, .qp-select:focus { border-color: var(--accent); }
  .qp-banner {
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 18px;
    display:flex; align-items:center; gap:14px;
    border: 1px solid var(--border-light);
  }
  .qp-banner .ic { width:52px; height:52px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:26px; flex-shrink:0; }
  .qp-banner h2 { font-size:19px; }
  .qp-banner span.sub { font-size:13px; color:var(--text-secondary); }
  .qp-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(360px, 1fr)); gap:16px; margin-bottom:24px; }
  .qp-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display:flex; flex-direction:column;
  }
  .qp-card-head { display:flex; align-items:center; gap:12px; padding:16px 18px; border-bottom:1px solid var(--border); }
  .qp-card-head .ic { width:44px; height:44px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
  .qp-card-head .nm { font-size:15px; font-weight:600; line-height:1.3; }
  .qp-badge { display:inline-block; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.4px; padding:2px 8px; border-radius:20px; margin-top:5px; }
  .qp-files { display:flex; flex-direction:column; }
  .qp-file {
    display:flex; align-items:center; gap:11px;
    padding:11px 18px;
    border-bottom:1px solid var(--border);
    cursor:pointer;
    transition: background .15s;
  }
  .qp-file:last-child { border-bottom:none; }
  .qp-file:hover { background: var(--bg-card-hover); }
  .qp-file .fic { width:30px; height:30px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
  .qp-file .fnm { flex:1; min-width:0; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .qp-file .fgo { font-size:11px; color:var(--text-muted); }
  .qp-file:hover .fgo { color: var(--accent); }
  .qp-files-msg { padding:16px 18px; font-size:12px; color:var(--text-muted); }
  .qp-spinner { display:inline-block; width:14px; height:14px; border:2px solid var(--border-light); border-top-color:var(--accent); border-radius:50%; animation:qpspin .7s linear infinite; vertical-align:-2px; margin-right:8px; }
  @keyframes qpspin { to { transform:rotate(360deg); } }
  .qp-section-title { font-size:13px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); font-weight:600; margin:6px 0 12px; }
  .qp-empty { text-align:center; color:var(--text-muted); padding:40px; }
  .qp-notice { background:rgba(231,76,60,0.10); border:1px solid rgba(231,76,60,0.3); color:#f3b6ae; border-radius:var(--radius-sm); padding:12px 14px; font-size:12px; margin-bottom:16px; line-height:1.5; }
  /* Popout viewer */
  .qp-modal-overlay {
    position:fixed; inset:0; background:rgba(4,8,12,0.82); backdrop-filter:blur(3px);
    display:none; align-items:center; justify-content:center; z-index:9999; padding:24px;
  }
  .qp-modal-overlay.open { display:flex; }
  .qp-modal {
    background:var(--bg-secondary); border:1px solid var(--border-light); border-radius:var(--radius);
    width:100%; max-width:980px; height:88vh; display:flex; flex-direction:column;
    box-shadow:0 24px 64px rgba(0,0,0,0.6); overflow:hidden;
  }
  .qp-modal-head { display:flex; align-items:center; gap:12px; padding:14px 18px; border-bottom:1px solid var(--border); }
  .qp-modal-head .mt { flex:1; min-width:0; font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .qp-modal-close {
    background:transparent; border:1px solid var(--border-light); color:var(--text-secondary);
    border-radius:var(--radius-sm); padding:7px 13px; font-size:13px; cursor:pointer; font-weight:600;
  }
  .qp-modal-close:hover { color:var(--text-primary); border-color:var(--text-secondary); }
  .qp-modal-body { flex:1; background:#fff; }
  .qp-modal-body iframe { width:100%; height:100%; border:none; }
  @media (max-width: 600px) { .qp-grid { grid-template-columns:1fr; } body { padding:14px; } .qp-modal { height:92vh; } }
</style>
</head>
<body>

<div class="qp-header">
  <div>
    <h1>Qualification Plans &amp; Curriculums</h1>
    <p id="qpSubtitle">Qualification plan and curriculum documents for each skill area.</p>
  </div>
</div>

<div id="qpBannerHost"></div>
<div id="qpNoticeHost"></div>

<div class="qp-controls" id="qpControls">
  <input type="text" class="qp-input" id="qpSearch" placeholder="Search programme or skill area…" oninput="qpRender()">
  <select class="qp-select" id="qpFilter" onchange="qpRender()">
    <option value="all">All Skill Areas</option>
  </select>
</div>

<div class="qp-grid" id="qpGrid"></div>

<!-- Popout document viewer -->
<div class="qp-modal-overlay" id="qpModal" onclick="if(event.target===this) qpCloseViewer()">
  <div class="qp-modal">
    <div class="qp-modal-head">
      <div class="fic" style="font-size:18px;">📄</div>
      <div class="mt" id="qpModalTitle">Document</div>
      <button class="qp-modal-close" onclick="qpCloseViewer()">✕ Close</button>
    </div>
    <div class="qp-modal-body"><iframe id="qpModalFrame" title="Document viewer" allow="autoplay"></iframe></div>
  </div>
</div>

<script>
/* ============================================================================
   Qualification Plan / Curriculum viewer
   ----------------------------------------------------------------------------
   Lists the documents inside each programme's Google Drive folder and opens
   them in an in-app popout viewer (Google's /preview embed) — users are never
   redirected to Drive itself.

   File enumeration uses, in order of preference:
     1. The host LMS's Google OAuth token (window.parent.googleAccessToken),
        available once an admin/staff member has connected Google Drive.
     2. A Drive API key (QP_API_KEY below) — needed so signed-out users
        (e.g. students on their own device) can still list the public,
        "anyone with link" folders.

   Access (from the ?role= / ?course= params set by the LMS):
     - student / instructor : only their skill area's folder(s) + Short Courses.
     - admin / adminstaff   : every programme, with a skill-area filter.
   ========================================================================= */

// OPTIONAL: paste a Google Drive API key here so signed-out users can list the
// public folders. Leave blank to rely solely on the connected admin/staff token.
var QP_API_KEY = '';

// Master folder ("0000000 - QUAL PLAN") containing all programme folders.
var QUAL_PLAN_FOLDER_ID = '1xwBUcgAmiw6LR0oOq4cyqD-VoGQA2P_Z';

// Programme folders for the qualification plans & curriculums. `general:true`
// programmes (Short Courses) are available to every user.
var QUAL_PLAN_PROGRAMS = [
  { title:"000 Short Courses (Job Certificate)",            folderId:"1laQ3n9YRMXZ7kmXkAncxPNNlzXDdYqt0", skillArea:null,                      general:true },
  { title:"Beauty Therapy Level 2",                         folderId:"194qSUzi_BSQE_0QHLYQAQn_hX2JbHFvL", skillArea:"Beauty Therapy" },
  { title:"Cosmetology Level 2",                            folderId:"180HFoONPHB44Dq9hKkyuvvcEaPQG2w3a", skillArea:"Cosmetology" },
  { title:"Electrical Installation and Maintenance L2",     folderId:"1RTYIrphKDbBbNMlWGUhJ5Cmid6cWEgOA", skillArea:"Electrical Installation" },
  { title:"Electrical Installation and Maintenance L3",     folderId:"1Xf9GXeOS6bJEXwt1V1Wfr__Jhf6h-cq8", skillArea:"Electrical Installation" },
  { title:"Hospitality Villa.Properties Services L2",       folderId:"1lmeQLq2h-UKhP06dnsyBwxezwfshW5Ll", skillArea:"Hospitality & Tourism" },
  { title:"Welding L2",                                     folderId:"1A_X9LAGnVGyL-KWAu2rqKcsLoTQqjXEA", skillArea:"Welding & Fabrication" },
  { title:"Welding L3",                                     folderId:"1W4I6wpXPJ51grRPNW0EwNqjJ5a3wV1lV", skillArea:"Welding & Fabrication" }
];

// Skill areas (mirrors the LMS list) for icon/colour.
var skillAreas = [
  {id:1,name:"Welding & Fabrication",icon:"🔥",color:"#e74c3c",desc:"SMAW, MIG, TIG welding processes and metal fabrication"},
  {id:2,name:"Electrical Installation",icon:"⚡",color:"#f1c40f",desc:"Residential and commercial wiring, conduit bending, circuits"},
  {id:3,name:"Cosmetology",icon:"💇",color:"#e91e63",desc:"Hair care, styling, chemical treatments, salon management"},
  {id:4,name:"Business Administration",icon:"💼",color:"#3498db",desc:"Office management, accounting, business communication"},
  {id:5,name:"Auto Mechanics",icon:"🔧",color:"#e67e22",desc:"Engine repair, diagnostics, brake and suspension systems"},
  {id:6,name:"Plumbing",icon:"🔩",color:"#1abc9c",desc:"Pipe fitting, drainage systems, water supply installation"},
  {id:7,name:"Carpentry",icon:"🪚",color:"#8d6e63",desc:"Furniture making, roof framing, cabinet installation"},
  {id:8,name:"Hospitality & Tourism",icon:"🏨",color:"#9b59b6",desc:"Food & beverage service, front office, housekeeping"},
  {id:9,name:"Information Technology",icon:"💻",color:"#2196f3",desc:"Networking, hardware repair, software applications"},
  {id:10,name:"Garment Construction",icon:"🧵",color:"#ff7043",desc:"Pattern drafting, sewing techniques, fashion design basics"},
  {id:11,name:"Refrigeration & AC",icon:"❄️",color:"#00bcd4",desc:"AC installation, refrigerant handling, system maintenance"},
  {id:12,name:"Heavy Equipment Ops",icon:"🚜",color:"#ff9800",desc:"Excavator, loader, bulldozer operation and safety"},
  {id:13,name:"Commercial Cooking",icon:"👨‍🍳",color:"#4caf50",desc:"Culinary arts, food safety, menu planning, pastry arts"},
  {id:14,name:"Beauty Therapy",icon:"💆",color:"#ce93d8",desc:"Facial treatments, body massage, nail technology"},
  {id:15,name:"Data Operations",icon:"📊",color:"#42a5f5",desc:"Data entry, spreadsheets, database management"},
  {id:16,name:"Agriculture",icon:"🌾",color:"#66bb6a",desc:"Crop production, livestock management, agribusiness"},
  {id:17,name:"Masonry",icon:"🧱",color:"#a1887f",desc:"Block laying, plastering, tiling, concrete work"},
  {id:18,name:"Solar Energy Tech",icon:"☀️",color:"#fdd835",desc:"PV installation, solar system design, inverter setup"},
  {id:19,name:"Early Childhood Ed",icon:"👶",color:"#ef9a9a",desc:"Child development, lesson planning, classroom management"},
  {id:20,name:"Customer Service",icon:"🎯",color:"#7e57c2",desc:"Communication skills, conflict resolution, CRM systems"}
];

function qpParam(name) {
  try {
    var v = new URLSearchParams(window.location.search).get(name);
    return v ? decodeURIComponent(v) : '';
  } catch (e) { return ''; }
}

var qpRole = qpParam('role') || 'admin';
var qpCourse = qpParam('course');
var qpUserName = qpParam('student');
var qpIsStaff = (qpRole === 'admin' || qpRole === 'adminstaff');
var qpFileCache = {};       // folderId -> array of files (or Error)
var qpNoticeShown = false;

// Read the host LMS's Drive token (same-origin parent). Null if standalone / unset.
function qpToken() {
  try {
    if (window.parent && window.parent !== window && window.parent.googleAccessToken) {
      return window.parent.googleAccessToken;
    }
  } catch (e) { /* cross-origin — ignore */ }
  return null;
}

function qpFindSkillArea(name) {
  if (!name) return null;
  var cn = name.toLowerCase().trim();
  var exact = skillAreas.find(function(sk){ return sk.name.toLowerCase().trim() === cn; });
  if (exact) return exact;
  var contains = skillAreas.find(function(sk){
    var sn = sk.name.toLowerCase().trim();
    return cn.indexOf(sn) !== -1 || sn.indexOf(cn) !== -1;
  });
  if (contains) return contains;
  var firstWord = skillAreas.find(function(sk){
    var fw = sk.name.split(' ')[0].toLowerCase();
    return fw.length > 2 && cn.indexOf(fw) !== -1;
  });
  return firstWord || null;
}

function qpSkillMeta(skillAreaName) {
  return qpFindSkillArea(skillAreaName) ||
    { name: skillAreaName || 'General', icon: '📚', color: '#3498db', desc: '' };
}

function qpHexToRgb(hex) {
  var h = hex.replace('#','');
  if (h.length === 3) h = h.split('').map(function(c){return c+c;}).join('');
  var n = parseInt(h, 16);
  return [(n>>16)&255, (n>>8)&255, n&255].join(',');
}

function qpEsc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

function qpFileIcon(mime) {
  mime = mime || '';
  if (mime.indexOf('pdf') !== -1) return '📕';
  if (mime.indexOf('document') !== -1 || mime.indexOf('word') !== -1) return '📄';
  if (mime.indexOf('spreadsheet') !== -1 || mime.indexOf('excel') !== -1) return '📊';
  if (mime.indexOf('presentation') !== -1 || mime.indexOf('powerpoint') !== -1) return '📑';
  if (mime.indexOf('image') !== -1) return '🖼️';
  if (mime.indexOf('folder') !== -1) return '📁';
  return '📄';
}

// List the (non-trashed) files inside a Drive folder. Cached per folder.
function qpListFolder(folderId) {
  if (qpFileCache[folderId]) return Promise.resolve(qpFileCache[folderId]);
  var token = qpToken();
  if (!token && !QP_API_KEY) {
    var err = new Error('no-auth');
    return Promise.resolve(err);
  }
  var q = encodeURIComponent("'" + folderId + "' in parents and trashed=false");
  var url = 'https://www.googleapis.com/drive/v3/files?q=' + q +
    '&fields=files(id,name,mimeType,modifiedTime)&orderBy=name&pageSize=200' +
    '&supportsAllDrives=true&includeItemsFromAllDrives=true';
  if (!token && QP_API_KEY) url += '&key=' + encodeURIComponent(QP_API_KEY);
  var opts = token ? { headers: { 'Authorization': 'Bearer ' + token } } : {};
  return fetch(url, opts)
    .then(function(r){ if(!r.ok) throw new Error('http-' + r.status); return r.json(); })
    .then(function(data){
      var files = (data.files || []).filter(function(f){ return f.mimeType !== 'application/vnd.google-apps.folder'; });
      qpFileCache[folderId] = files;
      return files;
    })
    .catch(function(e){ return e; });
}

function qpPopoutUrl(fileId) {
  return 'https://drive.google.com/file/d/' + fileId + '/preview';
}

function qpOpenViewer(fileId, fileName) {
  document.getElementById('qpModalTitle').textContent = fileName || 'Document';
  document.getElementById('qpModalFrame').src = qpPopoutUrl(fileId);
  document.getElementById('qpModal').classList.add('open');
}

function qpCloseViewer() {
  document.getElementById('qpModal').classList.remove('open');
  document.getElementById('qpModalFrame').src = 'about:blank';
}

document.addEventListener('keydown', function(e){ if(e.key === 'Escape') qpCloseViewer(); });

function qpRenderFiles(prog, idx, result) {
  var host = document.getElementById('qpFiles-' + idx);
  if (!host) return;
  if (result instanceof Error) {
    if (result.message === 'no-auth') {
      host.innerHTML = '<div class="qp-files-msg">Documents can\'t be listed yet — sign in to Google Drive (admin) or add a Drive API key.</div>';
      qpMaybeShowAuthNotice();
    } else {
      host.innerHTML = '<div class="qp-files-msg">Couldn\'t load documents for this folder.</div>';
    }
    return;
  }
  var search = (document.getElementById('qpSearch').value || '').toLowerCase().trim();
  var files = result.filter(function(f){ return !search || f.name.toLowerCase().indexOf(search) !== -1; });
  if (!files.length) {
    host.innerHTML = '<div class="qp-files-msg">' + (result.length ? 'No documents match your search.' : 'No documents in this folder yet.') + '</div>';
    return;
  }
  host.innerHTML = files.map(function(f){
    return '<div class="qp-file" onclick="qpOpenViewer(\'' + qpEsc(f.id) + '\',\'' + qpEsc(f.name).replace(/'/g,'&#39;') + '\')">' +
      '<div class="fic" style="background:rgba(240,165,0,0.12);">' + qpFileIcon(f.mimeType) + '</div>' +
      '<div class="fnm" title="' + qpEsc(f.name) + '">' + qpEsc(f.name) + '</div>' +
      '<div class="fgo">View ▸</div>' +
    '</div>';
  }).join('');
}

function qpMaybeShowAuthNotice() {
  if (qpNoticeShown || qpToken() || QP_API_KEY) return;
  qpNoticeShown = true;
  document.getElementById('qpNoticeHost').innerHTML =
    '<div class="qp-notice">Document previews need Google Drive access. An administrator should ' +
    'connect Google Drive in the LMS, or a Drive API key can be added so signed-out users ' +
    '(e.g. students) can view the public folders.</div>';
}

function qpCard(prog, idx) {
  var meta = prog.general
    ? { name: 'Short Courses', icon: '🎓', color: '#f0a500' }
    : qpSkillMeta(prog.skillArea);
  var rgb = qpHexToRgb(meta.color);
  var badgeLabel = prog.general ? 'All Learners' : meta.name;
  return '' +
    '<div class="qp-card">' +
      '<div class="qp-card-head">' +
        '<div class="ic" style="background:rgba(' + rgb + ',0.18);color:' + meta.color + ';">' + meta.icon + '</div>' +
        '<div>' +
          '<div class="nm">' + qpEsc(prog.title) + '</div>' +
          '<span class="qp-badge" style="background:rgba(' + rgb + ',0.18);color:' + meta.color + ';">' + qpEsc(badgeLabel) + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="qp-files" id="qpFiles-' + idx + '">' +
        '<div class="qp-files-msg"><span class="qp-spinner"></span>Loading documents…</div>' +
      '</div>' +
    '</div>';
}

function qpRender() {
  var grid = document.getElementById('qpGrid');
  var search = (document.getElementById('qpSearch').value || '').toLowerCase().trim();
  var filter = document.getElementById('qpFilter').value;
  var allowedSkill = (!qpIsStaff && qpCourse) ? qpSkillMeta(qpCourse) : null;

  var list = QUAL_PLAN_PROGRAMS.filter(function(prog){
    if (allowedSkill && !prog.general && prog.skillArea !== allowedSkill.name) return false;
    if (qpIsStaff && filter !== 'all' && (prog.general || prog.skillArea !== filter)) return false;
    return true;
  });

  if (!list.length) {
    grid.innerHTML = '<div class="qp-empty">No qualification plans available for this skill area yet.</div>';
    return;
  }

  grid.innerHTML = list.map(qpCard).join('');
  // Load + render each visible folder's documents.
  list.forEach(function(prog, idx){
    qpListFolder(prog.folderId).then(function(res){ qpRenderFiles(prog, idx, res); });
  });
}

function qpInit() {
  // Build skill-area filter from skill areas that actually have programmes.
  var sel = document.getElementById('qpFilter');
  var withPrograms = {};
  QUAL_PLAN_PROGRAMS.forEach(function(p){ if (p.skillArea) withPrograms[p.skillArea] = true; });
  Object.keys(withPrograms).sort().forEach(function(name){
    var o = document.createElement('option');
    o.value = name; o.textContent = name;
    sel.appendChild(o);
  });

  if (qpIsStaff) {
    document.getElementById('qpSubtitle').textContent =
      'All qualification plans & curriculums, organised by skill area.';
  } else {
    document.getElementById('qpControls').style.display = 'none';
    var skill = qpCourse ? qpSkillMeta(qpCourse) : null;
    if (skill) {
      document.getElementById('qpSubtitle').textContent =
        'Your qualification plan & curriculum for ' + skill.name + '.';
      var rgb = qpHexToRgb(skill.color);
      document.getElementById('qpBannerHost').innerHTML =
        '<div class="qp-banner" style="background:linear-gradient(135deg,rgba(' + rgb + ',0.16),rgba(52,152,219,0.05));">' +
          '<div class="ic" style="background:' + skill.color + '33;color:' + skill.color + ';">' + skill.icon + '</div>' +
          '<div>' +
            '<h2>' + qpEsc(skill.name) + '</h2>' +
            '<span class="sub">' +
              (qpUserName ? qpEsc(qpUserName) + ' — ' : '') +
              'Qualification plan &amp; curriculum for your skill area' +
            '</span>' +
          '</div>' +
        '</div>';
    }
  }

  qpRender();
}

document.addEventListener('DOMContentLoaded', qpInit);
</script>
</body>
</html>
